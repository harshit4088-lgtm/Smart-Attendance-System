<script>

// 🔥 Firebase (अपना original key डालना)
const firebaseConfig = {
 apiKey: "YOUR_REAL_API_KEY",
 authDomain: "attendance-app-f5c57.firebaseapp.com",
 databaseURL: "https://attendance-app-f5c57-default-rtdb.firebaseio.com",
 projectId: "attendance-app-f5c57"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = {};
let currentId = "";

// 🔹 LOAD
db.ref("students").on("value", snap=>{
 students = snap.val() || {};
 render();
});

// 🔹 ADD (FIXED)
function addStudent(){

 let n = document.getElementById("name").value.trim();
 let e = document.getElementById("enroll").value.trim();

 if(!n || !e){
  alert("Fill fields");
  return;
 }

 db.ref("students").push({
  name:n,
  enroll:e,
  records:{}
 });

 document.getElementById("name").value="";
 document.getElementById("enroll").value="";
}

// 🔹 RENDER
function render(){

 let html="";
 let today = new Date().toISOString().split("T")[0];

 Object.entries(students).forEach(([id,s])=>{

 let st = s.records?.[today] || "-";

 html += `
 <tr>
 <td onclick="openProfile('${id}')">${s.name}</td>
 <td>${s.enroll}</td>
 <td>
 <button onclick="mark('${id}','P')">P</button>
 <button onclick="mark('${id}','A')">A</button>
 <br>${st}
 </td>
 <td>${calc(s)}</td>
 <td><button onclick="del('${id}')">X</button></td>
 </tr>`;
 });

 document.getElementById("data").innerHTML = html;
}

// 🔹 %
function calc(s){
 let t = Object.keys(s.records||{}).length;
 let p = Object.values(s.records||{}).filter(v=>v==="P").length;
 return t ? ((p/t)*100).toFixed(1)+"%" : "0%";
}

// 🔹 MARK (FIXED)
function mark(id,val){

 let today = new Date().toISOString().split("T")[0];

 db.ref("students/"+id+"/records/"+today).set(val);
}

// 🔹 DELETE
function del(id){
 db.ref("students/"+id).remove();
}

// 🔹 EDIT
function openProfile(id){
 currentId = id;

 let s = students[id];

 document.getElementById("editName").value = s.name;
 document.getElementById("editEnroll").value = s.enroll;

 document.getElementById("modal").style.display="flex";
}

// 🔹 UPDATE (FIXED)
function updateStudent(){

 let newName = document.getElementById("editName").value;

 db.ref("students/"+currentId).update({
  name:newName
 });

 closeModal();
}

function closeModal(){
 document.getElementById("modal").style.display="none";
}

</script>
