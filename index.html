<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance Pro</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#0f172a,#1e3a8a);
 color:white;
}
.header{
 text-align:center;
 padding:20px;
 background:linear-gradient(135deg,#6366f1,#0ea5e9);
}
.container{
 display:grid;
 grid-template-columns:300px 1fr;
 gap:15px;
 padding:15px;
}
.card{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
}
input,button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border:none;
 border-radius:6px;
}
button{
 background:#22c55e;
 color:white;
 cursor:pointer;
}
table{
 width:100%;
 background:white;
 color:black;
}
th,td{
 padding:8px;
 text-align:center;
}
#modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:#0008;
 justify-content:center;
 align-items:center;
}
.modal-box{
 background:white;
 color:black;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Smart Attendance</h2>
</div>

<div class="container">

<div class="card" id="adminPanel">
<input id="name" placeholder="Name">
<input id="enroll" placeholder="Enrollment">
<input id="course" placeholder="Course">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">

<button onclick="addStudent()">Add Student</button>

<hr>

<input id="search" placeholder="Search" onkeyup="searchStudent()">
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Enrollment</th>
<th>Today</th>
<th>%</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<div id="modal">
<div class="modal-box">
<h3>Edit Student</h3>

<input id="editName">
<input id="editEnroll" disabled>
<input id="editCourse">
<input id="editFather">
<input id="editMobile">

<button onclick="updateStudent()">Update</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// 🔥 Firebase config
const firebaseConfig = {
 apiKey: "AIzaSyDGd7AS81Q53meBWVADmzDXAv_hwZaMMtw",
 authDomain: "attendance-app-f5c57.firebaseapp.com",
 databaseURL: "https://attendance-app-f5c57-default-rtdb.firebaseio.com",
 projectId: "attendance-app-f5c57"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students=[];
let currentId="";
let role="";
let userEnroll="";

// 🔐 Login
function loginSystem(){
 let saved=localStorage.getItem("role");

 if(saved){
  role=saved;
  userEnroll=localStorage.getItem("enroll");
  return;
 }

 role=prompt("teacher/student");

 if(role==="teacher"){
  let pass=prompt("password");
  if(pass!=="admin123"){alert("Wrong");location.reload();}
  localStorage.setItem("role","teacher");

 }else{
  let e=prompt("Enrollment");
  localStorage.setItem("role","student");
  localStorage.setItem("enroll",e);
  userEnroll=e;
 }
}
loginSystem();

if(role!=="teacher"){
 document.getElementById("adminPanel").style.display="none";
}

// ➕ Add
function addStudent(){

 let n=name.value.trim();
 let e=enroll.value.trim();

 if(!n||!e){alert("Fill all fields");return;}

 if(students.some(s=>s.enroll===e)){
  alert("Already exists");
  return;
 }

 let s={
  name:n,
  enroll:e,
  course:course.value,
  father:father.value,
  mobile:mobile.value,
  records:{}
 };

 db.ref("students").push(s);

 name.value="";
 enroll.value="";
 course.value="";
 father.value="";
 mobile.value="";
}

// 🔄 Load (FIXED)
db.ref("students").on("value",snap=>{
 let data=snap.val()||{};

 students=Object.entries(data).map(([key,val])=>({
  ...val,
  id:key
 }));

 render();
});

// 📊 %
function calc(s){
 let t=Object.keys(s.records||{}).length;
 let p=Object.values(s.records||{}).filter(v=>v==="P").length;
 return t?((p/t)*100).toFixed(1)+"%":"0%";
}

// 🖥️ Render
function render(list=students){

 if(role==="student"){
  list=list.filter(s=>s.enroll===userEnroll);
 }

 let html="";
 let today=new Date().toISOString().split("T")[0];

 list.forEach(s=>{
 let st=s.records?.[today]||"-";

 html+=`
 <tr>
 <td onclick="openProfile('${s.enroll}')">${s.name}</td>
 <td>${s.enroll}</td>
 <td>
 <button onclick="mark('${s.enroll}','P')">P</button>
 <button onclick="mark('${s.enroll}','A')">A</button>
 <br>${st}
 </td>
 <td>${calc(s)}</td>
 <td><button onclick="del('${s.enroll}')">X</button></td>
 </tr>`;
 });

 data.innerHTML=html;

 if(role==="student"){
  document.querySelectorAll("button").forEach(b=>{
   if(["P","A","X"].includes(b.innerText)){
    b.style.display="none";
   }
  });
 }
}

// 🟢 Mark (FIXED)
function mark(id,val){
 let today=new Date().toISOString().split("T")[0];

 let s=students.find(x=>x.enroll===id);

 s.records=s.records||{};
 s.records[today]=val;

 db.ref("students/"+s.id).update({
  records:s.records
 });
}

// ❌ Delete (FIXED)
function del(id){
 let s=students.find(x=>x.enroll===id);
 db.ref("students/"+s.id).remove();
}

// 🔍 Search
function searchStudent(){
 let v=search.value.toLowerCase();
 render(students.filter(s=>s.name.toLowerCase().includes(v)||s.enroll.includes(v)));
}

// ✏️ Edit
function openProfile(id){
 let s=students.find(x=>x.enroll===id);
 currentId=id;

 editName.value=s.name;
 editEnroll.value=s.enroll;
 editCourse.value=s.course;
 editFather.value=s.father;
 editMobile.value=s.mobile;

 modal.style.display="flex";
}

// 🔄 Update (FIXED)
function updateStudent(){
 let s=students.find(x=>x.enroll===currentId);

 db.ref("students/"+s.id).update({
  name:editName.value,
  course:editCourse.value,
  father:editFather.value,
  mobile:editMobile.value
 });

 closeModal();
}

// Close
function closeModal(){
 modal.style.display="none";
}

</script>

</body>
</html>
