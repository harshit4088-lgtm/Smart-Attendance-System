```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance - BCA Department</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}

.container{
 display:grid;
 grid-template-columns:300px 1fr;
 gap:10px;
 padding:10px
}

.card{
 background:#1e293b;
 padding:10px;
 border-radius:10px
}

input,button{
 width:100%;
 padding:8px;
 margin:5px 0;
 border-radius:6px;
 border:none
}

button{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 color:white;
 font-weight:bold;
 transition:0.3s;
}
button:hover{transform:scale(1.05)}

.header{
 display:flex;
 align-items:center;
 justify-content:center;
 gap:10px;
 padding:15px;
 background:linear-gradient(135deg,#6366f1,#0ea5e9);
 box-shadow:0 4px 15px rgba(0,0,0,0.4);
}
.header img{width:45px}

table{width:100%;background:white;color:black}
th,td{padding:8px;border-bottom:1px solid #ddd}

#modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:#0008;
 justify-content:center;
 align-items:center
}
.modal-box{
 background:white;
 color:black;
 padding:15px;
 border-radius:10px
}
</style>
</head>

<body>

<div class="header">
  <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png">
  <div>
    <h1>Smart Attendance</h1>
    <p>BCA Department</p>
  </div>
</div>

<div class="container">

<div class="card" id="adminPanel">
<input id="name" placeholder="Name">
<input id="enroll" placeholder="Enrollment">
<input id="course" placeholder="Course">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">

<button onclick="addStudent()">Add Student</button>

<hr>

<input id="search" placeholder="Search" onkeyup="searchStudent()">
<button onclick="showMonthly()">Monthly View</button>
<button onclick="downloadExcel()">Download Excel</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Enrollment</th>
<th>Today</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<!-- Modal -->
<div id="modal">
<div class="modal-box">

<h3>Edit Student</h3>

<input id="editName">
<input id="editEnroll" disabled>
<input id="editCourse">
<input id="editFather">
<input id="editMobile">

<button onclick="updateStudent()">Update</button>
<button onclick="closeModal()">Close</button>

</div>
</div>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDGd7AS81Q53meBWVADmzDXAv_hwZaMMtw",
  authDomain: "attendance-app-f5c57.firebaseapp.com",
  databaseURL: "https://attendance-app-f5c57-default-rtdb.firebaseio.com",
  projectId: "attendance-app-f5c57",
  storageBucket: "attendance-app-f5c57.firebasestorage.app",
  messagingSenderId: "20575897666",
  appId: "1:20575897666:web:33ccc40e4c88aa67cf05db"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students=[];
let currentId="";

// Role
let role = localStorage.getItem("role") || prompt("teacher/student");
localStorage.setItem("role",role);

if(role!=="teacher"){
 document.getElementById("adminPanel").style.display="none";
}

// Add
function addStudent(){

 let n = name.value.trim();
 let e = enroll.value.trim();

 if(!n || !e){
  alert("Fill all fields ❗");
  return;
 }

 if(students.some(s=>s.enroll===e)){
  alert("Enrollment already exists ❌");
  return;
 }

 let s={
  name:n,
  enroll:e,
  course:course.value,
  father:father.value,
  mobile:mobile.value,
  records:{}
 };

 students.push(s);
 save();

 alert("Student Added ✅");

 name.value="";
 enroll.value="";
 course.value="";
 father.value="";
 mobile.value="";
}

// Save
function save(){
 db.ref("students").set(students);
}

// Load
db.ref("students").on("value",snap=>{
 students=snap.val()||[];
 render();
});

// Render
function render(list=students){
let html="";
let today=new Date().toISOString().split("T")[0];

list.forEach(s=>{
let st=s.records?.[today]||"-";

html+=`
<tr>
<td onclick="openProfile('${s.enroll}')">${s.name}</td>
<td>${s.enroll}</td>
<td>
<button onclick="mark('${s.enroll}','P')">P</button>
<button onclick="mark('${s.enroll}','A')">A</button>
<br>${st}
</td>
<td>
<button onclick="del('${s.enroll}')">X</button>
</td>
</tr>`;
});

data.innerHTML = html;
}

// Mark
function mark(id,val){
let today=new Date().toISOString().split("T")[0];

students=students.map(s=>{
 if(s.enroll===id){
  if(!s.records)s.records={};
  s.records[today]=val;
 }
 return s;
});

save();
}

// Delete
function del(id){
students=students.filter(s=>s.enroll!==id);
save();
}

// Search
function searchStudent(){
let v=search.value.toLowerCase();
render(students.filter(s=>s.name.toLowerCase().includes(v)||s.enroll.includes(v)));
}

// Open Profile
function openProfile(id){
 let s=students.find(x=>x.enroll===id);

 currentId=id;

 editName.value=s.name;
 editEnroll.value=s.enroll;
 editCourse.value=s.course;
 editFather.value=s.father;
 editMobile.value=s.mobile;

 if(role!=="teacher"){
  document.querySelector("button[onclick='updateStudent()']").style.display="none";
 }

 modal.style.display="flex";
}

// Update
function updateStudent(){

 students=students.map(s=>{
  if(s.enroll===currentId){
   s.name=editName.value;
   s.course=editCourse.value;
   s.father=editFather.value;
   s.mobile=editMobile.value;
  }
  return s;
 });

 save();
 alert("Updated ✅");
 closeModal();
}

// Close modal
function closeModal(){
modal.style.display="none";
}

// Excel
function downloadExcel(){
let arr=[];
students.forEach(s=>{
Object.entries(s.records||{}).forEach(([d,st])=>{
arr.push({Name:s.name,Enrollment:s.enroll,Date:d,Status:st});
});
});
let ws=XLSX.utils.json_to_sheet(arr);
let wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"data");
XLSX.writeFile(wb,"attendance.xlsx");
}

// Monthly View
function showMonthly(){

 let html="<h3>📅 Monthly Attendance</h3>";

 students.forEach(s=>{
  html+=`<b>${s.name} (${s.enroll})</b><br>`;

  if(s.records){
   Object.entries(s.records).forEach(([date,status])=>{
    html+=`${date} : ${status}<br>`;
   });
  }

  html+="<hr>";
 });

 document.querySelector(".card:last-child").innerHTML = html;
}

</script>

</body>
</html>
