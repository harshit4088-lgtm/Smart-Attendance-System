<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance - BCA Department</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<!-- QR -->
<script src="https://unpkg.com/html5-qrcode"></script>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
.container{display:grid;grid-template-columns:300px 1fr;gap:10px;padding:10px}
.card{background:#1e293b;padding:10px;border-radius:10px}
input,button{width:100%;padding:8px;margin:5px 0;border-radius:6px;border:none}
button{cursor:pointer}
.green{background:#22c55e}
.red{background:#ef4444}
.blue{background:#3b82f6}
table{width:100%;background:white;color:black}
th,td{padding:8px}
#modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;justify-content:center;align-items:center}
.modal-box{background:white;color:black;padding:15px;border-radius:10px}
</style>
</head>

<body>
<h2 style="text-align:center">Smart Attendance - BCA Department</h2>

<div class="container">

<div class="card" id="adminPanel">
<input id="name" placeholder="Name">
<input id="enroll" placeholder="Enrollment">
<input id="course" placeholder="Course">
<input id="father" placeholder="Father Name">
<input id="mobile" placeholder="Mobile">
<button class="green" onclick="addStudent()">Add</button>
<hr>
<input id="search" placeholder="Search" onkeyup="searchStudent()">
<button class="blue" onclick="downloadExcel()">Download Excel</button>
</div>

<div class="card">
<table>
<thead><tr><th>Name</th><th>Enrollment</th><th>Today</th><th>Action</th></tr></thead>
<tbody id="data"></tbody>
</table>

<div id="qr" style="width:250px"></div>
<button onclick="startQR()">Start QR Scan</button>

</div>

</div>

<!-- Modal -->
<div id="modal">
<div class="modal-box">
<h3 id="mName"></h3>
<p id="mEnroll"></p>
<p id="mCourse"></p>
<p id="mFather"></p>
<p id="mMobile"></p>
<p id="mAtt"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// 🔥 Firebase config (अपना डालना)
const firebaseConfig = {
 apiKey: "YOUR_KEY",
 authDomain: "YOUR_DOMAIN",
 databaseURL: "YOUR_DB",
 projectId: "YOUR_ID",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students=[];

// 🔐 Role
let role = localStorage.getItem("role") || prompt("teacher/student");
localStorage.setItem("role",role);
if(role!=="teacher") document.getElementById("adminPanel").style.display="none";

// ADD
function addStudent(){
let s={
 name:name.value,
 att:att.value,
 enroll:enroll.value,
 course:course.value,
 father:father.value,
 mobile:mobile.value,
 records:{}
};
students.push(s);
save();
}

// SAVE (Firebase)
function save(){
 db.ref("students").set(students);
}

// LIVE LOAD
 db.ref("students").on("value",snap=>{
 students=snap.val()||[];
 render();
 });

// RENDER
function render(list=students){
let html="";
let today=new Date().toISOString().split("T")[0];
list.forEach(s=>{
let st=s.records?.[today]||"-";
html+=`<tr>
<td onclick="openProfile('${s.enroll}')">${s.name}</td>
<td>${s.enroll}</td>
<td>
<button onclick="mark('${s.enroll}','P')">P</button>
<button onclick="mark('${s.enroll}','A')">A</button>
<br>${st}</td>
<td><button onclick="del('${s.enroll}')">X</button></td>
</tr>`;
});
data.innerHTML = html;
