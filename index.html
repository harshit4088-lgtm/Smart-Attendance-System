<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Attendance Pro</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(135deg,#0f172a,#1e3a8a);
 color:white;
}

.header{
 text-align:center;
 padding:20px;
 font-size:22px;
 font-weight:bold;
 background:linear-gradient(135deg,#6366f1,#0ea5e9);
}

.container{
 display:grid;
 grid-template-columns:300px 1fr;
 gap:15px;
 padding:15px;
}

.card{
 background:#1e293b;
 padding:15px;
 border-radius:12px;
}

input,button{
 width:100%;
 padding:10px;
 margin:5px 0;
 border-radius:6px;
 border:none;
}

button{
 background:linear-gradient(135deg,#22c55e,#16a34a);
 color:white;
 cursor:pointer;
}

table{
 width:100%;
 background:white;
 color:black;
}

th,td{
 padding:10px;
 text-align:center;
}

#modal{
 display:none;
 position:fixed;
 top:0;left:0;
 width:100%;height:100%;
 background:#0008;
 justify-content:center;
 align-items:center;
}

.modal-box{
 background:white;
 color:black;
 padding:20px;
 border-radius:10px;
}
</style>
</head>

<body>

<div class="header">Smart Attendance 🚀</div>

<div class="container">

<div class="card" id="adminPanel">
<input id="name" placeholder="Name">
<input id="enroll" placeholder="Enrollment">

<button onclick="addStudent()">Add Student</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>Name</th>
<th>Enroll</th>
<th>Today</th>
<th>%</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<!-- Modal -->
<div id="modal">
<div class="modal-box">
<input id="editName">
<input id="editEnroll" disabled>

<button onclick="updateStudent()">Update</button>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>

// 🔥 Firebase
const firebaseConfig = {
 apiKey: "AIzaSy...",
 authDomain: "attendance-app-f5c57.firebaseapp.com",
 databaseURL: "https://attendance-app-f5c57-default-rtdb.firebaseio.com",
 projectId: "attendance-app-f5c57"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let students = {};
let currentId = "";

// 🔹 LOAD DATA
db.ref("students").on("value", snap=>{
 students = snap.val() || {};
 render();
});

// 🔹 ADD STUDENT (FIXED)
function addStudent(){

 let n = document.getElementById("name").value.trim();
 let e = document.getElementById("enroll").value.trim();

 if(!n || !e){
  alert("Fill fields");
  return;
 }

 let id = db.ref("students").push().key;

 db.ref("students/"+id).set({
  name:n,
  enroll:e,
  records:{}
 });

 document.getElementById("name").value="";
 document.getElementById("enroll").value="";
}

// 🔹 RENDER (FIXED)
function render(){

 let html="";
 let today = new Date().toISOString().split("T")[0];

 Object.entries(students).forEach(([id,s])=>{

 let st = s.records?.[today] || "-";

 html += `
 <tr>
 <td onclick="openProfile('${id}')">${s.name}</td>
 <td>${s.enroll}</td>
 <td>
 <button onclick="mark('${id}','P')">P</button>
 <button onclick="mark('${id}','A')">A</button>
 <br>${st}
 </td>
 <td>${calc(s)}</td>
 <td><button onclick="del('${id}')">X</button></td>
 </tr>`;
 });

 document.getElementById("data").innerHTML = html;
}

// 🔹 % CALC
function calc(s){
 let t = Object.keys(s.records||{}).length;
 let p = Object.values(s.records||{}).filter(v=>v==="P").length;
 return t ? ((p/t)*100).toFixed(1)+"%" : "0%";
}

// 🔹 MARK (FIXED)
function mark(id,val){

 let today = new Date().toISOString().split("T")[0];

 let s = students[id];
 s.records = s.records || {};
 s.records[today] = val;

 db.ref("students/"+id).update(s);
}

// 🔹 DELETE (FIXED)
function del(id){
 db.ref("students/"+id).remove();
}

// 🔹 EDIT
function openProfile(id){
 currentId = id;

 let s = students[id];

 editName.value = s.name;
 editEnroll.value = s.enroll;

 modal.style.display="flex";
}

function updateStudent(){

 let s = students[currentId];

 s.name = editName.value;

 db.ref("students/"+currentId).update(s);

 closeModal();
}

function closeModal(){
 modal.style.display="none";
}

</script>

</body>
</html>
