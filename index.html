<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance System</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h2 style="text-align:center">📊 Attendance Dashboard</h2>

<div class="main-layout">

<div class="sidebar">
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll No">
<input id="att" placeholder="Attendance %">

<button id="addBtn">Add Student</button>
</div>

<div class="content">
<table>
<thead>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Attendance</th>
<th>Action</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

</div>

<!-- JS LAST ME -->
<script src="script.js"></script>

</body>
</html>
